<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape of My Heart - Karaoke Style</title>
    <style>
        body {
            background: #0f0c29;
            background: linear-gradient(to bottom, #1a0a33, #302b63, #0f0c29);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-icons {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 15px;
            filter: drop-shadow(0 0 10px white);
        }

        h1 { font-size: 1.8rem; margin: 10px 0; }
        p.artist { color: #aaa; margin-bottom: 40px; }

        /* Gaya Lirik Satu Per Satu */
        #lyrics-container {
            min-height: 150px;
            font-size: 1.5rem;
            line-height: 1.6;
            perspective: 1000px;
        }

        .word {
            display: inline-block;
            margin-right: 10px;
            opacity: 0;
            transform: translateY(20px) rotateX(-90deg);
            animation: revealWord 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        @keyframes revealWord {
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .controls { margin-top: 40px; }

        button {
            background: white;
            border: none;
            color: #0f0c29;
            padding: 15px 45px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <div class="theme-icons">♠️ ♣️ ♥️ ♦️</div>
        <h1>Shape of My Heart</h1>
        <p class="artist">Sting</p>

        <div id="lyrics-container">
            <span style="opacity: 0.5; font-style: italic;">Sedia? Klik butang di bawah...</span>
        </div>

        <div class="controls">
            <button id="playBtn">Mainkan Lagu ✨</button>
        </div>

        <!-- Masukkan fail lagu anda di sini -->
        <audio id="myAudio" src="shapeofmyheart.mp3"></audio>
    </div>

<script>
    const audio = document.getElementById('myAudio');
    const playBtn = document.getElementById('playBtn');
    const lyricsDisplay = document.getElementById('lyrics-container');

    // Data lirik perkataan demi perkataan (Masa dalam saat)
    // Anda boleh tambah atau adjust masa ini mengikut tempo lagu
    const lyricsData = [
        { time: 5.0, text: "He", clear: true },
        { time: 5.4, text: "deals" },
        { time: 5.8, text: "the" },
        { time: 6.2, text: "cards" },
        { time: 7.0, text: "as" },
        { time: 7.3, text: "a" },
        { time: 7.8, text: "meditation..." },
        
        { time: 10.5, text: "And", clear: true },
        { time: 10.9, text: "those" },
        { time: 11.3, text: "he" },
        { time: 11.7, text: "plays" },
        { time: 12.5, text: "never" },
        { time: 13.0, text: "suspect..." },

        { time: 16.0, text: "But", clear: true },
        { time: 16.4, text: "that's" },
        { time: 16.8, text: "not" },
        { time: 17.2, text: "the" },
        { time: 17.8, text: "shape" },
        { time: 18.2, text: "of" },
        { time: 18.5, text: "my" },
        { time: 19.0, text: "heart..." }
    ];

    let lastIndex = -1;

    playBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = "Pause ⏸️";
        } else {
            audio.pause();
            playBtn.innerText = "Mainkan Lagu ✨";
        }
    });

    audio.addEventListener('timeupdate', () => {
        const currentTime = audio.currentTime;
        
        // Cari perkataan yang patut muncul
        const currentIndex = lyricsData.findIndex((l, i) => {
            return currentTime >= l.time && (lyricsData[i+1] ? currentTime < lyricsData[i+1].time : true);
        });

        if (currentIndex !== -1 && currentIndex !== lastIndex) {
            // Jika ada tanda 'clear', kosongkan skrin untuk baris baru
            if (lyricsData[currentIndex].clear) {
                lyricsDisplay.innerHTML = "";
            }

            const span = document.createElement('span');
            span.classList.add('word');
            span.innerText = lyricsData[currentIndex].text;
            lyricsDisplay.appendChild(span);
            
            lastIndex = currentIndex;
        }
    });

    // --- LOGIK BACKGROUND PARTICLES ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height + canvas.height;
            this.size = Math.random() * 3 + 1;
            this.speedY = Math.random() * -1 - 0.5;
            this.opacity = Math.random() * 0.5 + 0.1;
        }
        update() {
            this.y += this.speedY;
            if (this.y < -10) this.reset();
        }
        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    const particles = Array.from({ length: 70 }, () => new Particle());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
