<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Player - Backstreet Boys</title>
    <style>
        /* Gaya Asas & Latar Belakang Gradient */
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #2e1a4f, #1a0a2e, #0a0514);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* Canvas untuk Animasi Visualizer */
        #visualizerCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Bekas Utama Glassmorphism (Kesan Kaca) */
        .glass-player {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 90%;
            max-width: 650px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .glass-player:hover {
            transform: translateY(-5px);
        }

        /* Tajuk & Artis */
        .header h1 {
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .header p.artist {
            color: #ffb3d9;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 50px 0;
            font-weight: 300;
        }

        /* Bekas Lirik */
        #lyrics-display {
            min-height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 600;
            perspective: 1000px;
        }

        /* Animasi Lirik Keluar */
        .word {
            display: inline-block;
            margin: 6px 10px;
            opacity: 0;
            transform: translateY(20px) scale(0.8);
            filter: blur(8px);
            animation: textReveal 0.6s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        @keyframes textReveal {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        #progress {
            flex-grow: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        #progress-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(to right, #ff4d94, #ffb3d9);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 77, 148, 0.8);
            transition: width 0.1s linear;
        }

        /* Kawalan Butang */
        .controls {
            margin-top: 30px;
        }

        #playBtn {
            background: rgba(255, 77, 148, 0.9);
            border: none;
            color: white;
            padding: 18px 55px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 77, 148, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            gap: 10px;
        }

        #playBtn:hover {
            background: #ff1a75;
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(255, 77, 148, 0.6);
        }
    </style>
</head>
<body>

    <!-- Canvas untuk Melukis Visualizer Dinamik -->
    <canvas id="visualizerCanvas"></canvas>

    <!-- Pemain Glassmorphism -->
    <div class="glass-player">
        <div class="header">
            <h1>Shape of My Heart</h1>
            <p class="artist">Backstreet Boys</p>
        </div>

        <!-- Tempat Lirik Dipaparkan -->
        <div id="lyrics-display">
            <span style="opacity: 0.5; font-style: italic; font-size: 1.1rem;">Tekan Play untuk mulakan animasi ✨</span>
        </div>

        <!-- Progress Bar & Masa -->
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <div id="progress">
                <div id="progress-bar"></div>
            </div>
            <span id="total-time">3:51</span>
        </div>

        <div class="controls">
            <button id="playBtn">▶ Mainkan Lagu</button>
        </div>

        <!-- Fail Audio -->
        <audio id="myAudio" src="shapeofmyheart.mp3"></audio>
    </div>

<script>
    const audio = document.getElementById('myAudio');
    const playBtn = document.getElementById('playBtn');
    const lyricsDisplay = document.getElementById('lyrics-display');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress');
    const currentTimeEl = document.getElementById('current-time');
    const totalTimeEl = document.getElementById('total-time');

    // --- Data Lirik (Masa dalam Saat) ---
    const lyricsData = [
        { time: 10.0, text: "Baby,", clear: true }, { time: 10.5, text: "please" }, { time: 11.2, text: "try" },
        { time: 11.8, text: "to" }, { time: 12.2, text: "forgive" }, { time: 13.0, text: "me..." },
        { time: 15.5, text: "Stay", clear: true }, { time: 16.0, text: "here," }, { time: 16.5, text: "don't" },
        { time: 17.0, text: "let" }, { time: 17.5, text: "me" }, { time: 18.0, text: "go..." },
        { time: 22.0, text: "I'm", clear: true }, { time: 22.5, text: "here" }, { time: 23.0, text: "with" },
        { time: 23.5, text: "all" }, { time: 24.0, text: "my" }, { time: 24.5, text: "heart" },
        { time: 25.0, text: "for" }, { time: 25.5, text: "you..." },
        { time: 28.5, text: "But", clear: true }, { time: 29.0, text: "that's" }, { time: 29.5, text: "not" },
        { time: 30.0, text: "the" }, { time: 30.8, text: "shape" }, { time: 31.5, text: "of" },
        { time: 32.0, text: "my" }, { time: 32.5, text: "heart..." }
    ];

    let lastIndex = -1;
    let audioContext, analyser, source, bufferLength, dataArray;

    // --- Inisialisasi Web Audio API (Hanya bila Play ditekan) ---
    function initAudioAnalyzer() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256; // Ketepatan analisis
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }
    }

    // --- Logik Utama Play/Pause & Masa ---
    playBtn.addEventListener('click', () => {
        initAudioAnalyzer();
        if (audio.paused) {
            audio.play().catch(() => alert("Pastikan ada fail 'lagu.mp3' dalam folder!"));
            playBtn.innerHTML = "⏸️ Pause";
        } else {
            audio.pause();
            playBtn.innerHTML = "▶ Mainkan Lagu";
        }
    });

    audio.addEventListener('timeupdate', () => {
        const currentTime = audio.currentTime;
        const duration = audio.duration;

        // Kemaskini Progress Bar & Masa
        if (duration) {
            progressBar.style.width = `${(currentTime / duration) * 100}%`;
            currentTimeEl.innerText = formatTime(currentTime);
        }

        // Kemaskini Lirik
        const currentIndex = lyricsData.findIndex((l, i) => {
            return currentTime >= l.time && (lyricsData[i+1] ? currentTime < lyricsData[i+1].time : true);
        });

        if (currentIndex !== -1 && currentIndex !== lastIndex) {
            if (lyricsData[currentIndex].clear) lyricsDisplay.innerHTML = "";
            const span = document.createElement('span');
            span.classList.add('word');
            span.innerText = lyricsData[currentIndex].text;
            lyricsDisplay.appendChild(span);
            lastIndex = currentIndex;
        }
    });

    // Menunjukkan durasi penuh bila lagu dimuatkan
    audio.addEventListener('loadedmetadata', () => { totalTimeEl.innerText = formatTime(audio.duration); });

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    // --- LOGIK VISUALIZER DINAMIK (DANCING PARTICLES) ---
    const canvas = document.getElementById('visualizerCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y; this.baseX = x; this.baseY = y;
            this.size = Math.random() * 2 + 1;
            this.opacity = Math.random();
            this.speedFactor = Math.random() * 0.1 + 0.05;
        }
        update(audioStrength) {
            // Zarah bergerak rawak sikit, tapi akan kuat bila 'audioStrength' (bass) tinggi
            let movement = audioStrength * this.speedFactor;
            this.x = this.baseX + (Math.random() - 0.5) * movement * 10;
            this.y = this.baseY + (Math.random() - 0.5) * movement * 10;
            this.opacity = audioStrength / 255; // Lebih cerah bila audio kuat
        }
        draw() {
            ctx.fillStyle = `rgba(255, 179, 217, ${this.opacity})`; // Pink
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    const particles = [];
    // Cipta zarah dalam bentuk jantung besar
    for (let i = 0; i < Math.PI * 2; i += 0.08) {
        let r = 18;
        let x = r * 16 * Math.sin(i) ** 3 + canvas.width / 2;
        let y = -r * (13 * Math.cos(i) - 5 * Math.cos(2*i) - 2 * Math.cos(3*i) - Math.cos(4*i)) + canvas.height / 2 - 50;
        particles.push(new Particle(x, y));
    }
    // Tambah zarah rawak di latar belakang
    for (let i = 0; i < 80; i++) {
        particles.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height));
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let avgAudioStrength = 0;
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            avgAudioStrength = dataArray.reduce((a, b) => a + b, 0) / bufferLength;
        }

        particles.forEach(p => {
            p.update(avgAudioStrength);
            p.draw();
        });

        requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
